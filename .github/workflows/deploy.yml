env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
  IMAGE_NAME: edtech_backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: abhishekanand0586/edtech_backend
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            BUILD_CONFIGURATION=Release

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

      - name: Build summary
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "📦 Image: abhishekanand0586/edtech_backend"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"
          echo "🆔 Digest: ${{ steps.meta.outputs.digest }}"

  # AUTO-DEPLOYMENT JOB WITH PASSWORD AUTHENTICATION
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'  # Deploy on main or master branch
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Define upload path
            UPLOAD_PATH="/var/www/edtech_backend/uploads"
            
            # Create upload directory if not exists
            mkdir -p $UPLOAD_PATH
            
            # Pull latest image
            docker pull abhishekanand0586/edtech_backend:latest
            
            # Stop and remove old container
            docker stop edtech_backend 2>/dev/null || true
            docker rm edtech_backend 2>/dev/null || true
            
            # Run new container (matching your manual process)
            docker run -d \
              -v $UPLOAD_PATH:/app/wwwroot/tempdata/uploads \
              -p 8080:8080 \
              -p 8081:8081 \
              --name edtech_backend \
              --restart unless-stopped \
              abhishekanand0586/edtech_backend:latest
            
            # Set permissions for Apache (matching your manual process)
            sudo chown -R www-data:www-data $UPLOAD_PATH
            sudo chmod -R 777 $UPLOAD_PATH
            
            # Verify deployment
            echo "Deployment completed successfully!"
            echo "Container: edtech_backend"
            echo "Upload path: $UPLOAD_PATH"
            docker ps | grep edtech_backend || echo "Container starting..."
            sleep 5
            docker logs edtech_backend --tail 10
